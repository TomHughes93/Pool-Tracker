<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pool Tracker</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0f172a; margin: 0; padding: 4px; display: flex; flex-direction: column; align-items: center; -webkit-user-select: none; user-select: none; }
        .container { width: 100%; max-width: 450px; background: #1e293b; padding: 6px; border: 1px solid #334155; }
        h2 { text-align: center; margin: 0 0 6px 0; font-size: 16px; color: #f8fafc; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .scoreboard { background: #0f172a; border: 1px solid #334155; padding: 6px; margin-bottom: 4px; text-align: center; }
        .score-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 6px; font-size: 14px; font-weight: 700; color: #f1f5f9; border-bottom: 1px solid #1e293b; }
        .score-row:last-child { border-bottom: none; }
        .player-info { display: flex; align-items: center; gap: 6px; }
        .session-tally { font-size: 11px; color: #cbd5e1; font-weight: bold; background: #334155; padding: 1px 4px; }
        .foul-tally { font-size: 11px; color: #ffffff; font-weight: bold; background: #ea580c; padding: 1px 4px; }
        .color-indicator { width: 10px; height: 10px; display: inline-block; visibility: hidden; border: 1px solid #000; }
        .color-red { background-color: #ef4444; visibility: visible; }
        .color-yellow { background-color: #eab308; visibility: visible; }
        .turn-indicator { font-size: 12px; color: #94a3b8; font-weight: 700; text-transform: uppercase; margin-bottom: 1px; }
        .visits-indicator { font-size: 14px; font-weight: 800; color: #38bdf8; }
        
        .ball-rack-container { background: #0f172a; border: 1px solid #334155; padding: 6px; margin-bottom: 4px; text-align: center; }
        .ball-rack-title { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        .ball-rack-row { display: flex; justify-content: center; gap: 4px; min-height: 20px; align-items: center; margin-bottom: 6px; }
        .rack-ball { width: 18px; height: 18px; border: 1px solid #000; transition: opacity 0.2s; }
        .rack-ball.potted { opacity: 0.1; border: 1px dashed #475569; background: transparent !important; }
        .rack-red { background: #ef4444; }
        .rack-yellow { background: #eab308; }
        
        .rack-adjustments { display: flex; gap: 6px; }
        .adj-btn { background: #1e293b; color: #94a3b8; border: 1px solid #334155; padding: 6px; font-size: 11px; font-weight: bold; cursor: pointer; flex: 1; }
        .adj-btn:active { background: #334155; color: #fff; }

        .section-box { border: 1px solid #334155; padding: 6px; margin-bottom: 4px; background: #0f172a; }
        .section-title { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        select { width: 100%; padding: 6px; border: 1px solid #334155; font-size: 13px; background-color: #1e293b; color: #fff; height: 36px; }
        
        .color-assign-box { background: #0f172a; border: 1px solid #334155; padding: 8px; margin-bottom: 4px; text-align: center; }
        .color-assign-title { font-size: 12px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; }
        .color-btn-group { display: flex; gap: 6px; }
        .color-assign-btn { flex: 1; padding: 10px; border: none; font-weight: bold; font-size: 12px; text-transform: uppercase; color: white; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 4px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 4px; width: 100%; }
        
        button { width: 100%; padding: 12px 6px; font-size: 13px; font-weight: 800; border: none; cursor: pointer; color: white; text-transform: uppercase; }
        
        .btn-pot { background-color: #10b981; }
        .btn-pot:active { background-color: #059669; }
        .btn-miss { background-color: #ef4444; }
        .btn-miss:active { background-color: #dc2626; }
        
        .btn-foul { background-color: #f97316; font-size: 10px; padding: 10px 2px; line-height: 1.1; width: 100%; }
        .btn-foul:active { background-color: #ea580c; }
        
        .btn-win { background-color: #000000; border: 1px solid #334155; font-size: 11px; }
        .btn-win:active { background-color: #1e293b; }
        .btn-loss { background-color: #4b5563; border: 1px solid #475569; font-size: 10px; }
        .btn-loss:active { background-color: #374151; }
        
        .log-box { width: 100%; height: 70px; border: 1px solid #334155; padding: 4px; font-size: 11px; background: #0f172a; overflow-y: auto; color: #94a3b8; }
        .footer-actions { display: flex; gap: 6px; margin-top: 4px; }
        .btn-undo { background-color: #1e293b; color: #cbd5e1; border: 1px solid #334155; font-size: 11px; padding: 8px; }
        .btn-undo:active { background-color: #334155; }
        .btn-new { background-color: #1e293b; color: #cbd5e1; border: 1px solid #334155; font-size: 11px; padding: 8px; }
        .btn-new:active { background-color: #334155; }
        
        .auth-section { margin-top: 10px; background: #0f172a; border: 1px dashed #334155; padding: 8px; text-align: center; }
        .auth-input { width: 100%; padding: 6px; margin-bottom: 4px; border: 1px solid #334155; background: #1e293b; color: #fff; font-size: 12px; }
        .auth-btn { background: #334155; padding: 6px; font-size: 11px; }
        .auth-status { font-size: 10px; margin-top: 2px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Pool Tracker</h2>
    
    <div class="scoreboard">
        <div class="turn-indicator" id="turn-display">Turn: Match Not Started</div>
        <div class="visits-indicator" id="visits-display">Visits Remaining: 1</div>
        <hr style="border: 0; border-top: 1px solid #334155; margin: 4px 0;">
        <div class="score-row">
            <div class="player-info">
                <span id="p1-name-display">Ginge</span>
                <span class="session-tally" id="p1-tally">0W - 0L</span>
                <span class="foul-tally" id="p1-fouls" style="display: none;">0 Fouls</span>
            </div>
            <span class="color-indicator" id="p1-color-dot"></span>
        </div>
        <div class="score-row">
            <div class="player-info">
                <span id="p2-name-display">Schmidty</span>
                <span class="session-tally" id="p2-tally">0W - 0L</span>
                <span class="foul-tally" id="p2-fouls" style="display: none;">0 Fouls</span>
            </div>
            <span class="color-indicator" id="p2-color-dot"></span>
        </div>
    </div>

    <div class="ball-rack-container" id="visual-rack" style="display: none;">
        <div class="ball-rack-title" id="rack-title">Remaining Table Balls</div>
        <div class="ball-rack-row" id="ball-row"></div>
        <div class="rack-adjustments">
            <button class="adj-btn" onclick="breakPotAdjust('Red', -1)">-1 Red</button>
            <button class="adj-btn" onclick="breakPotAdjust('Yellow', -1)">-1 Yellow</button>
        </div>
    </div>

    <div class="section-box" id="setup-section">
        <div class="section-title">Match Setup</div>
        <div class="grid-2" style="margin-bottom: 4px;">
            <select id="p1-select" onchange="updatePlayerNames()">
                <option value="Ginge">Ginge</option>
                <option value="Schmidty">Schmidty</option>
                <option value="Ethan">Ethan</option>
                <option value="Jon">Jon</option>
                <option value="Cal">Cal</option>
                <option value="Aid">Aid</option>
                <option value="Mitch">Mitch</option>
                <option value="Rawlins">Rawlins</option>
                <option value="Guest 1">Guest 1</option>
                <option value="Guest 2">Guest 2</option>
            </select>
            <select id="p2-select" onchange="updatePlayerNames()">
                <option value="Schmidty">Schmidty</option>
                <option value="Ginge">Ginge</option>
                <option value="Ethan">Ethan</option>
                <option value="Jon">Jon</option>
                <option value="Cal">Cal</option>
                <option value="Aid">Aid</option>
                <option value="Mitch">Mitch</option>
                <option value="Rawlins">Rawlins</option>
                <option value="Guest 1">Guest 1</option>
                <option value="Guest 2">Guest 2</option>
            </select>
        </div>
        <select id="break-select" onchange="setStartingPlayer()">
            <option value="">-- Who is breaking? --</option>
            <option value="p1">Ginge</option>
            <option value="p2">Schmidty</option>
        </select>
    </div>

    <div class="color-assign-box" id="color-assignment-ui" style="display: none;">
        <div class="color-assign-title">Open Table: Assign Colors</div>
        <div class="color-btn-group">
            <button class="color-assign-btn btn-claim-red" onclick="assignTableColors('Red')">Claim Reds</button>
            <button class="color-assign-btn btn-claim-yellow" onclick="assignTableColors('Yellow')">Claim Yellows</button>
        </div>
    </div>

    <div class="section-box">
        <div class="section-title">Game Log</div>
        <div class="log-box" id="log-box">Select who breaks to begin tracking.</div>
    </div>

    <div id="controls-section" style="pointer-events: none; opacity: 0.4;">
        <div class="section-title">Controls</div>
        <div class="grid-2">
            <button class="btn-pot" onclick="logShot('Pot')">Ball Potted</button>
            <button class="btn-miss" onclick="logShot('Miss')">Miss</button>
        </div>
        
        <div class="grid-3">
            <button class="btn-foul" onclick="logShot('Foul - Potted White')">Foul<br>(White)</button>
            <button class="btn-foul" onclick="logShot('Foul - No Hit')">Foul<br>(No Hit)</button>
            <button class="btn-foul" onclick="logShot('Foul - Opponent Potted')">Foul<br>(Opp Pot)</button>
        </div>
        
        <div class="grid-2">
            <button class="btn-win" onclick="logShot('Pot Black')">Pot Black (Win)</button>
            <button class="btn-loss" onclick="logShot('Loss of Frame - Potted Black and White')">Black + White (Loss)</button>
        </div>
    </div>

    <div class="footer-actions">
        <button class="btn-undo" onclick="undoLastShot()" style="opacity: 0.4; pointer-events: none;" id="undo-btn"><= Undo</button>
        <button class="btn-new" onclick="resetContainer()">New Game</button>
    </div>

    <div class="auth-section">
        <div class="section-title">Admin Database Gate</div>
        <div id="auth-logged-out">
            <input type="email" id="auth-email" class="auth-input" placeholder="Supabase Email">
            <input type="password" id="auth-password" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleLogin()">Connect Table</button>
        </div>
        <div id="auth-logged-in" style="display: none;">
            <span style="color: #4ade80; font-size: 13px; font-weight: bold;">✓ Live Scoring Connected</span>
            <button class="auth-btn" style="background: #f87171; padding: 2px 6px; font-size: 11px; margin-left: 6px; width: auto; display: inline-block;" onclick="handleLogout()">Disconnect</button>
        </div>
        <div class="auth-status" id="auth-status-msg" style="color: #64748b;">Public Offline View</div>
    </div>
</div>

<script>
    const _supabaseUrl = "https://dwpwxywkexjxedkgvgyi.supabase.co";
    const _supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3cHd4eXdrZXhqeGVka2d2Z3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODAwNTAsImV4cCI6MjA5NDc1NjA1MH0.hCnLJh87d0LDvnnvPkcdhm2MmdQOpok_QmiBBAw4e2s"; 

    let matchId = "";
    let player1 = "Ginge";
    let player2 = "Schmidty";
    let activePlayer = "";
    let breakerPlayer = "";
    let visitsRemaining = 1;
    let tableColorsAssigned = false;
    let playerColors = {}; 
    let isOpeningBreakCompleted = false;

    let redsRemaining = 7;
    let yellowsRemaining = 7;
    let sessionScores = {};
    let p1Fouls = 0;
    let p2Fouls = 0;

    let matchStats = {};
    let actionHistoryStack = [];

    function initMatchStats() {
        matchStats = {
            [player1]: { total_shots: 0, total_misses: 0, break_pots: 0, break_misses: 0, total_fouls: 0 },
            [player2]: { total_shots: 0, total_misses: 0, break_pots: 0, break_misses: 0, total_fouls: 0 }
        };
        actionHistoryStack = [];
        updateUndoButtonVisibility();
    }

    function updateUndoButtonVisibility() {
        const btn = document.getElementById('undo-btn');
        if (actionHistoryStack.length > 0) {
            btn.style.opacity = "1";
            btn.style.pointerEvents = "auto";
        } else {
            btn.style.opacity = "0.4";
            btn.style.pointerEvents = "none";
        }
    }

    function captureHistorySnapshot(actionLabel) {
        actionHistoryStack.push({
            label: actionLabel,
            activePlayer: activePlayer,
            visitsRemaining: visitsRemaining,
            tableColorsAssigned: tableColorsAssigned,
            playerColors: JSON.stringify(playerColors),
            isOpeningBreakCompleted: isOpeningBreakCompleted,
            redsRemaining: redsRemaining,
            yellowsRemaining: yellowsRemaining,
            p1Fouls: p1Fouls,
            p2Fouls: p2Fouls,
            matchStatsSnapshot: JSON.stringify(matchStats)
        });
        updateUndoButtonVisibility();
    }

    function getAuthHeaders() {
        const token = localStorage.getItem("pool_tracker_token");
        const headers = {
            "apikey": _supabaseKey,
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
        };
        if (token) {
            headers["Authorization"] = "Bearer " + token;
        } else {
            headers["Authorization"] = "Bearer " + _supabaseKey;
        }
        return headers;
    }

    async function handleLogin() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const msg = document.getElementById('auth-status-msg');
        
        msg.innerText = "Connecting...";
        msg.style.color = "#64748b";

        try {
            const res = await fetch(`${_supabaseUrl}/auth/v1/token?grant_type=password`, {
                method: "POST",
                headers: { "apikey": _supabaseKey, "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if (!res.ok || data.error) {
                msg.innerText = "Error: " + (data.error_description || data.error || "Login Failed");
                msg.style.color = "#ef4444";
                return;
            }

            localStorage.setItem("pool_tracker_token", data.access_token);
            localStorage.setItem("pool_tracker_authenticated_at", Math.floor(Date.now() / 1000).toString());
            showLoggedInState();
        } catch (err) {
            msg.innerText = "Connection failed.";
            msg.style.color = "#ef4444";
        }
    }

    function showLoggedInState() {
        document.getElementById('auth-logged-out').style.display = "none";
        document.getElementById('auth-logged-in').style.display = "block";
        const msg = document.getElementById('auth-status-msg');
        msg.innerText = "Write Access Enabled";
        msg.style.color = "#4ade80";
    }

    function handleLogout() {
        localStorage.removeItem("pool_tracker_token");
        localStorage.removeItem("pool_tracker_authenticated_at");
        document.getElementById('auth-logged-out').style.display = "block";
        document.getElementById('auth-logged-in').style.display = "none";
        const msg = document.getElementById('auth-status-msg');
        msg.innerText = "Public Offline View";
        msg.style.color = "#64748b";
    }

    function updatePlayerNames() {
        player1 = document.getElementById('p1-select').value;
        player2 = document.getElementById('p2-select').value;
        document.getElementById('p1-name-display').innerText = player1;
        document.getElementById('p2-name-display').innerText = player2;
        
        const bSelect = document.getElementById('break-select');
        bSelect.options[1].text = player1;  bSelect.options[1].value = "p1";
        bSelect.options[2].text = player2;  bSelect.options[2].value = "p2";
        
        renderTallies();
    }

    function checkSessionExpiry() {
        const currentDateStr = new Date().toLocaleDateString('en-GB');
        const savedDateStr = localStorage.getItem("pool_session_date");
        
        if (savedDateStr && savedDateStr !== currentDateStr) {
            localStorage.removeItem("pool_session_scores");
            sessionScores = {};
        } else {
            const savedScores = localStorage.getItem("pool_session_scores");
            sessionScores = savedScores ? JSON.parse(savedScores) : {};
        }
        localStorage.setItem("pool_session_date", currentDateStr);

        const token = localStorage.getItem("pool_tracker_token");
        const authTimestamp = localStorage.getItem("pool_tracker_authenticated_at");
        
        if (token && authTimestamp) {
            const loginTime = parseInt(authTimestamp, 10);
            const currentTime = Math.floor(Date.now() / 1000);
            const extendedExpirySeconds = 604799; 
            const safetyBuffer = 43200; 
            
            if ((loginTime + extendedExpirySeconds) - currentTime < safetyBuffer) {
                console.log("Database token entering critical security expiration window. Cleaning local authorization state.");
                handleLogout();
            }
        }
    }

    function recordSessionWin(winnerName, loserName) {
        if (!sessionScores[winnerName]) sessionScores[winnerName] = { wins: 0, losses: 0 };
        if (!sessionScores[loserName]) sessionScores[loserName] = { wins: 0, losses: 0 };
        sessionScores[winnerName].wins++;
        sessionScores[loserName].losses++;
        localStorage.setItem("pool_session_scores", JSON.stringify(sessionScores));
        renderTallies();
    }

    function renderTallies() {
        const p1Data = sessionScores[player1] || { wins: 0, losses: 0 };
        const p2Data = sessionScores[player2] || { wins: 0, losses: 0 };
        document.getElementById('p1-tally').innerText = p1Data.wins + "W - " + p1Data.losses + "L";
        document.getElementById('p2-tally').innerText = p2Data.wins + "W - " + p2Data.losses + "L";
    }

    function setStartingPlayer() {
        const breakChoice = document.getElementById('break-select').value;
        if (!breakChoice) return;

        matchId = "match_" + Date.now();
        activePlayer = (breakChoice === "p1") ? player1 : player2;
        breakerPlayer = activePlayer;
        visitsRemaining = 1;
        tableColorsAssigned = false;
        isOpeningBreakCompleted = false;
        playerColors = {};
        
        redsRemaining = 7;
        yellowsRemaining = 7;
        p1Fouls = 0;
        p2Fouls = 0;

        initMatchStats();

        document.getElementById('p1-color-dot').className = "color-indicator";
        document.getElementById('p2-color-dot').className = "color-indicator";
        document.getElementById('setup-section').style.display = "none";
        document.getElementById('color-assignment-ui').style.display = "block";
        document.getElementById('controls-section').style.pointerEvents = "auto";
        document.getElementById('controls-section').style.opacity = "1";
        
        document.getElementById('p1-fouls').style.display = "inline-block";
        document.getElementById('p2-fouls').style.display = "inline-block";
        updateFoulDisplay();

        document.getElementById('visual-rack').style.display = "block";
        renderBallRack();

        document.getElementById('turn-display').innerText = "Turn: " + activePlayer + " (Open Table)";
        document.getElementById('visits-display').innerText = "Visits Remaining: " + visitsRemaining;
        
        addToLog("Match started. " + activePlayer + " is breaking.");
        saveState();
    }

    function updateFoulDisplay() {
        document.getElementById('p1-fouls').innerText = p1Fouls + " Foul" + (p1Fouls !== 1 ? "s" : "");
        document.getElementById('p2-fouls').innerText = p2Fouls + " Foul" + (p2Fouls !== 1 ? "s" : "");
    }

    function renderBallRack() {
        const row = document.getElementById('ball-row');
        row.innerHTML = "";
        for (let i = 0; i < 7; i++) {
            const ball = document.createElement('div');
            ball.className = "rack-ball rack-red" + (i >= redsRemaining ? " potted" : "");
            row.appendChild(ball);
        }
        const spacer = document.createElement('div');
        spacer.style.width = "2px";
        spacer.style.height = "20px";
        spacer.style.background = "rgba(255,255,255,0.15)";
        row.appendChild(spacer);
        for (let i = 0; i < 7; i++) {
            const ball = document.createElement('div');
            ball.className = "rack-ball rack-yellow" + (i >= yellowsRemaining ? " potted" : "");
            row.appendChild(ball);
        }
        if (tableColorsAssigned) {
            document.getElementById('rack-title').innerText = "Balls Left | Reds: " + redsRemaining + " - Yellows: " + yellowsRemaining;
        } else {
            document.getElementById('rack-title').innerText = "Open Table | 7 Reds - 7 Yellows Left";
        }
    }

    function breakPotAdjust(color, amount) {
        if (amount > 0) return; 
        
        captureHistorySnapshot("Pot on Break - " + color);

        if (color === 'Red' && redsRemaining > 0) redsRemaining--;
        if (color === 'Yellow' && yellowsRemaining > 0) yellowsRemaining--;

        matchStats[activePlayer].total_shots++;
        if (!isOpeningBreakCompleted) {
            matchStats[activePlayer].break_pots++;
            isOpeningBreakCompleted = true;
        }

        addToLog(activePlayer + " - Pot on Break - " + color);
        renderBallRack();
        saveState();
    }

    function assignTableColors(chosenColor) {
        captureHistorySnapshot("Color Claim");
        tableColorsAssigned = true;
        const opponent = (activePlayer === player1) ? player2 : player1;
        const alternativeColor = (chosenColor === "Red") ? "Yellow" : "Red";
        playerColors[activePlayer] = chosenColor;
        playerColors[opponent] = alternativeColor;

        if (playerColors[player1]) document.getElementById('p1-color-dot').className = "color-indicator color-" + playerColors[player1].toLowerCase();
        if (playerColors[player2]) document.getElementById('p2-color-dot').className = "color-indicator color-" + playerColors[player2].toLowerCase();

        document.getElementById('color-assignment-ui').style.display = "none";
        addToLog(activePlayer + " claimed " + chosenColor + "s. " + opponent + " has " + alternativeColor + "s.");
        updateDisplay();
        renderBallRack();
        saveState();
    }

    function updateDisplay() {
        let suffix = " (Open Table)";
        if (tableColorsAssigned && playerColors[activePlayer]) {
            suffix = " (" + playerColors[activePlayer] + "s)";
        }
        document.getElementById('turn-display').innerText = "Turn: " + activePlayer + suffix;
        document.getElementById('visits-display').innerText = "Visits Remaining: " + visitsRemaining;
    }

    function logShot(shotType) {
        if (!activePlayer) return;

        captureHistorySnapshot(shotType);

        const opponent = (activePlayer === player1) ? player2 : player1;
        let isFrameOver = false;
        let nextPlayer = activePlayer;
        let nextVisits = visitsRemaining;
        let frameWinner = "";
        let frameLoser = "";

        matchStats[activePlayer].total_shots++;

        if (!isOpeningBreakCompleted) {
            if (shotType === 'Miss' || shotType.startsWith('Foul')) {
                matchStats[activePlayer].break_misses++;
            }
            isOpeningBreakCompleted = true;
        }

        if (shotType === 'Pot' && tableColorsAssigned) {
            const activeColor = playerColors[activePlayer];
            if (activeColor === "Red" && redsRemaining > 0) redsRemaining--;
            if (activeColor === "Yellow" && yellowsRemaining > 0) yellowsRemaining--;
        }

        if (shotType === 'Pot Black' || shotType === 'Loss of Frame - Potted Black and White') {
            let activeColor = playerColors[activePlayer] || "Open Table";
            let remainingCount = (activeColor === "Red") ? redsRemaining : (activeColor === "Yellow") ? yellowsRemaining : 7;
            
            isFrameOver = true;
            if (shotType === 'Loss of Frame - Potted Black and White' || activeColor === "Open Table" || remainingCount > 0) {
                frameWinner = opponent;
                frameLoser = activePlayer;
                matchStats[activePlayer].total_misses++; 
                matchStats[activePlayer].total_fouls++; 
                addToLog("❌ Violation: Black foul. " + activePlayer + " loses the frame.");
            } else {
                frameWinner = activePlayer;
                frameLoser = opponent;
                nextVisits = 0;
            }
        } else if (shotType === 'Pot') {
            nextVisits = 1; 
        } else if (shotType === 'Miss') {
            matchStats[activePlayer].total_misses++;
            if (visitsRemaining === 2) {
                nextVisits = 1;
            } else {
                nextPlayer = opponent;
                nextVisits = 1;
            }
        } else if (shotType.startsWith('Foul')) {
            matchStats[activePlayer].total_misses++; 
            matchStats[activePlayer].total_fouls++; 
            if (activePlayer === player1) p1Fouls++; else p2Fouls++;
            updateFoulDisplay();
            
            if (shotType === 'Foul - Opponent Potted' && tableColorsAssigned) {
                const opponentColor = playerColors[opponent];
                if (opponentColor === "Red" && redsRemaining > 0) redsRemaining--;
                if (opponentColor === "Yellow" && yellowsRemaining > 0) yellowsRemaining--;
            }
            
            nextPlayer = opponent;
            nextVisits = 2;
        }

        addToLog(activePlayer + " - " + shotType);
        renderBallRack();

        if (isFrameOver) {
            addToLog("🏆 " + frameWinner + " wins the game!");
            recordSessionWin(frameWinner, frameLoser);

            document.getElementById('controls-section').style.pointerEvents = "none";
            document.getElementById('controls-section').style.opacity = "0.4";
            document.getElementById('setup-section').style.display = "block";
            document.getElementById('visual-rack').style.display = "none";
            document.getElementById('p1-fouls').style.display = "none";
            document.getElementById('p2-fouls').style.display = "none";
            
            sendSummariesToSupabase(frameWinner, frameLoser);

            activePlayer = "";
            matchId = "";
            breakerPlayer = "";
            p1Fouls = 0;
            p2Fouls = 0;
            actionHistoryStack = [];
            updateUndoButtonVisibility();
            localStorage.removeItem("pool_tracker_state");
            return;
        }

        activePlayer = nextPlayer;
        visitsRemaining = nextVisits;
        updateDisplay();
        saveState();
    }

    function sendSummariesToSupabase(winner, loser) {
        const payload = [
            {
                match_id: matchId,
                player_name: winner,
                is_winner: true,
                total_shots: matchStats[winner].total_shots,
                total_misses: matchStats[winner].total_misses,
                break_pots: matchStats[winner].break_pots,
                break_misses: matchStats[winner].break_misses,
                total_fouls: matchStats[winner].total_fouls
            },
            {
                match_id: matchId,
                player_name: loser,
                is_winner: false,
                total_shots: matchStats[loser].total_shots,
                total_misses: matchStats[loser].total_misses,
                break_pots: matchStats[loser].break_pots,
                break_misses: matchStats[loser].break_misses,
                total_fouls: matchStats[loser].total_fouls
            }
        ];

        fetch(`${_supabaseUrl}/rest/v1/match_summaries`, {
            method: "POST",
            headers: getAuthHeaders(),
            body: JSON.stringify(payload)
        })
        .then(() => console.log('Aggregated match metrics logged successfully.'))
        .catch(err => console.error('Database payload transmission fault:', err));
    }

    function undoLastShot() {
        if (actionHistoryStack.length === 0) return;

        const lastState = actionHistoryStack.pop();

        activePlayer = lastState.activePlayer;
        visitsRemaining = lastState.visitsRemaining;
        tableColorsAssigned = lastState.tableColorsAssigned;
        playerColors = JSON.parse(lastState.playerColors);
        isOpeningBreakCompleted = lastState.isOpeningBreakCompleted;
        redsRemaining = lastState.redsRemaining;
        yellowsRemaining = lastState.yellowsRemaining;
        p1Fouls = lastState.p1Fouls;
        p2Fouls = lastState.p2Fouls;
        matchStats = JSON.parse(lastState.matchStatsSnapshot);

        if (tableColorsAssigned) {
            document.getElementById('color-assignment-ui').style.display = "none";
            if (playerColors[player1]) document.getElementById('p1-color-dot').className = "color-indicator color-" + playerColors[player1].toLowerCase();
            if (playerColors[player2]) document.getElementById('p2-color-dot').className = "color-indicator color-" + playerColors[player2].toLowerCase();
        } else {
            document.getElementById('color-assignment-ui').style.display = "block";
            document.getElementById('p1-color-dot').className = "color-indicator";
            document.getElementById('p2-color-dot').className = "color-indicator";
        }

        updateFoulDisplay();
        updateDisplay();
        renderBallRack();
        updateUndoButtonVisibility();
        
        addToLog("↩ Undone: " + lastState.label);
        saveState();
    }

    function addToLog(msg) {
        const box = document.getElementById('log-box');
        box.innerHTML += "<div>" + msg + "</div>";
        box.scrollTop = box.scrollHeight;
    }

    function saveState() {
        const state = {
            matchId, player1, player2, activePlayer, breakerPlayer, visitsRemaining, isOpeningBreakCompleted,
            tableColorsAssigned, playerColors, redsRemaining, yellowsRemaining, p1Fouls, p2Fouls, matchStats, actionHistoryStack,
            logHTML: document.getElementById('log-box').innerHTML,
            setupVisible: document.getElementById('setup-section').style.display,
            colorVisible: document.getElementById('color-assignment-ui').style.display,
            rackVisible: document.getElementById('visual-rack').style.display
        };
        localStorage.setItem("pool_tracker_state", JSON.stringify(state));
    }

    function loadState() {
        const raw = localStorage.getItem("pool_tracker_state");
        if (!raw) return;
        try {
            const state = JSON.parse(raw);
            matchId = state.matchId; player1 = state.player1; player2 = state.player2;
            activePlayer = state.activePlayer; breakerPlayer = state.breakerPlayer || ""; 
            visitsRemaining = state.visitsRemaining;
            isOpeningBreakCompleted = state.isOpeningBreakCompleted || false;
            tableColorsAssigned = state.tableColorsAssigned;
            playerColors = state.playerColors || {};
            redsRemaining = state.redsRemaining !== undefined ? state.redsRemaining : 7;
            yellowsRemaining = state.yellowsRemaining !== undefined ? state.yellowsRemaining : 7;
            p1Fouls = state.p1Fouls || 0;
            p2Fouls = state.p2Fouls || 0;
            matchStats = state.matchStats || {};
            actionHistoryStack = state.actionHistoryStack || [];

            document.getElementById('p1-select').value = player1;
            document.getElementById('p2-select').value = player2;
            document.getElementById('p1-name-display').innerText = player1;
            document.getElementById('p2-name-display').innerText = player2;

            if (tableColorsAssigned && playerColors[player1]) {
                document.getElementById('p1-color-dot').className = "color-indicator color-" + playerColors[player1].toLowerCase();
                document.getElementById('p2-color-dot').className = "color-indicator color-" + playerColors[player2].toLowerCase();
            }

            document.getElementById('log-box').innerHTML = state.logHTML;
            document.getElementById('setup-section').style.display = state.setupVisible;
            document.getElementById('color-assignment-ui').style.display = state.colorVisible;
            document.getElementById('visual-rack').style.display = state.rackVisible || "none";
            
            if (activePlayer) {
                document.getElementById('controls-section').style.pointerEvents = "auto";
                document.getElementById('controls-section').style.opacity = "1";
                document.getElementById('p1-fouls').style.display = "inline-block";
                document.getElementById('p2-fouls').style.display = "inline-block";
                updateFoulDisplay();
                renderBallRack();
            }
            updateDisplay();
            updateUndoButtonVisibility();
        } catch (e) {
            console.error(e);
        }
    }

    function resetContainer() {
        if(confirm("Start a clean frame?")) {
            localStorage.removeItem("pool_tracker_state");
            location.reload();
        }
    }

    window.onload = function() {
        checkSessionExpiry();
        updatePlayerNames();
        loadState();
        if (localStorage.getItem("pool_tracker_token")) {
            showLoggedInState();
        }

        setInterval(checkSessionExpiry, 60000);
    };
</script>
