<html lang="en">

        .color-btn-group { display: flex; gap: 10px; }

        .btn-claim-red { background-color: #ff3b30; }

        .btn-pot { background-color: #34c759; }
        .btn-miss { background-color: #ff3b30; }
        .btn-foul { background-color: #e2e2e2; color: #333333; font-weight: 600; margin-bottom: 6px; border: 1px solid #cbd5e1; }
        .btn-win { background-color: #8e8e93; font-weight: 700; margin-bottom: 10px; }
